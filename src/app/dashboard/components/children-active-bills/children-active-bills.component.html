<div class="expense-container mt-4">
  <h3>{{ "ALL_ACTIVE_CHILD_BILLS" | translate }} ... 🟢</h3>
  <div class="d-flex justify-content-between align-items-center">
    <div class="d-flex flex-column justify-content-between">
      <input
        type="text"
        placeholder="ابحث عن فاتورة... 🔍"
        class="search-input mt-4"
        [(ngModel)]="searchQuery"
        (input)="searchExpense(searchQuery)"
      />
      <div
        class="d-flex justify-content-start align-items-center mt-4 flex-wrap gap-2"
        *ngIf="userInfo?.role === 'admin' || userInfo?.role === 'owner' || userInfo?.role === 'manager'"
      >
        <app-branch-multi-select
          *ngIf="userInfo?.role === 'admin' || userInfo?.role === 'owner'"
          (selectedBranchesChange)="onBranchSelectionChange($event)"
        ></app-branch-multi-select>

        <!-- Filter Dropdown -->
        <mat-form-field
          appearance="fill"
          class="mx-2"
          *ngIf="filterKeys.length"
        >
          <mat-label>تصفية</mat-label>
          <mat-select
            [(ngModel)]="selectedFilter"
            (ngModelChange)="onFilterChange($event)"
          >
            <mat-option value="">الكل</mat-option>
            <mat-option *ngFor="let key of filterKeys" [value]="key">{{
              key
            }}</mat-option>
          </mat-select>
        </mat-form-field>
      </div>
    </div>
    <div class="d-flex gap-2">
      <button class="dialog-button" (click)="openCreateBillDialog()">
        + {{ "CREATE" | translate }}
      </button>
      <button
        class="dialog-button subscription-btn"
        (click)="openSubscriptionBillDialog()"
      >
        + اضافة فاتورة اشتراك
      </button>
    </div>
  </div>
</div>

<app-data-table
  [displayedColumns]="[
    'NAME',
    'PHONE_NUMBER',
    'SPENT_TIME',
    'CHILDREN_COUNT',
    'BRANCH',
  ]"
  [isActiveBills]="true"
  [data]="billsRes"
  (itemClicked)="goToBillProfile($event)"
  (CloseBillClicked)="openCloseBillDialog($event)"
  (promoClicked)="openPromoDialog($event)"
></app-data-table>
