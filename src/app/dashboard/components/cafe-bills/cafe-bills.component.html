<div class="expense-container mt-4">
  <div class="d-flex justify-content-between align-items-center">
    <div class="d-flex flex-column justify-content-between">
      <h1>{{ "ALL_CAFE_BILLS" | translate }} ... ☕🧾</h1>
      <div class="position-relative d-inline-block">
        <input
          type="text"
          placeholder="ابحث عن فاتورة... 🔍"
          class="search-input mt-4"
          [(ngModel)]="searchQuery"
          (input)="searchExpense(searchQuery)"
        />
        <mat-spinner *ngIf="searchLoading" diameter="20" class="search-field-spinner"></mat-spinner>
      </div>
      <div
        class="d-flex justify-content-start align-items-center mt-4 position-relative"
      >
        <app-branch-multi-select
          *ngIf="userInfo?.role === 'admin' || userInfo?.role === 'owner'"
          (selectedBranchesChange)="onBranchSelectionChange($event)"
          [class.disabled-filter]="isLoading"
        ></app-branch-multi-select>
        <app-date-time-range-filter
          class="mx-3"
          [value]="selectedDateRange"
          [disabled]="isLoading"
          (rangeChange)="onDateTimeRangeChange($event)"
        ></app-date-time-range-filter>
      </div>

      <!-- Arabic date range display outside the date picker -->
      <div
        class="mt-2 date-wrapper"
        *ngIf="selectedDateRange.start && selectedDateRange.end"
      >
        <span class="date-range-arabic"> ⏰ {{ getDateRangeInArabic() }} </span>
      </div>
    </div>
    <div>
      <button
        class="dialog-button"
        (click)="makeOrder()"
        [disabled]="isLoading"
      >
        + {{ "Create_order" | translate }}
      </button>
    </div>
  </div>
</div>

<!-- Table with loading overlay -->
<div class="table-container position-relative">
  <!-- Loading overlay for table -->
  <div *ngIf="isLoading" class="table-loader-overlay">
    <div class="spinner-container d-flex justify-content-center mb-5">
      <mat-spinner diameter="40"></mat-spinner>
    </div>
  </div>

  <app-data-table
    [displayedColumns]="displayedColumns"
    [data]="billsRes"
    (itemClicked)="openBillDialog($event.BILLS_ID)"
    [paginationType]="'server'"
    [totalItems]="totalItems"
  [perPage]="perPage"
  [pagesCount]="pagesCount"
    (editClicked)="openUpdateBillDialog($event.BILLS_ID)"
    [currentPage]="currentPage"
    (pageChange)="pageChanged($event)"
    [class.loading-state]="isLoading"
  ></app-data-table>
</div>
